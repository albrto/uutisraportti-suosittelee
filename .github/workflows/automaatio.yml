name: Uutisraportti Automaatio

on:
  push:
    paths:
      - 'admin/korjaukset.json'
      - 'ohitukset.json'
  schedule:
    # Torstaisin klo 16:00 UTC (18:00 Suomen aikaa kevät-syksy, 18:00/19:00)
    - cron: '0 16 * * 4'
  workflow_dispatch:
    # Mahdollistaa käsin ajamisen GitHubin web-käyttöliittymästä

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Lataa repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Asenna ffmpeg (pydub-leikkausta varten)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
          
      - name: Asenna Python-riippuvuudet
        run: pip install -r requirements.txt
        
      - name: 1. Sovella odottavat korjaukset master-dataan
        run: python scripts/sovella_korjaukset.py admin/korjaukset.json
        
      - name: 2. Pureskele tuoreimmat jaksot tekstiksi ja analysoi tekoälyllä
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/uutisraportti_automaatio_deepgram_claude.py
        
      - name: 3. Etsi epäilyttävät suosittelijanimet validointia varten
        run: python scripts/generoi_validointidata.py
        
      - name: 4. Lähetä raportti sähköpostitse Netlify Formsin kautta
        run: python scripts/laheta_ilmoitus.py
        
      - name: 5. Generoi automaattinen muutosloki
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generoi_muutosloki.py
        
      - name: 6. Commitoi tulokset takaisin GitHubiin (josta Netlify julkaisee ne)
        run: |
          git config --global user.name 'GitHub Actions Automaatio'
          git config --global user.email 'actions@github.com'
          git add suositukset.json historia_json.txt admin/epailyttavat.json admin/epailyttavat.js admin/korjaukset.json muutokset.html || true
          if git diff --staged --quiet; then
            echo "Ei muutoksia commitattavaksi."
          else
            git commit -m "Automaatio: Päivitetty suositukset ja muutosloki"
            git push
          fi
