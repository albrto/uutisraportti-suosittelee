<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uutisraportti – Suosittelijavalidointi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117;
      --bg-card: #191d28;
      --bg-card-hover: #1e2333;
      --bg-elevated: #242838;
      --accent: #4f8ef7;
      --accent-dim: #2d5cb8;
      --warn: #f59e0b;
      --warn-bg: #2a1f06;
      --success: #34d399;
      --success-bg: #052918;
      --danger: #f87171;
      --danger-bg: #2a0a0a;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --text-dim: #5b6478;
      --border: #2a2f3d;
      --border-accent: #364060;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* === HEADER === */
    header {
      background: linear-gradient(135deg, #111827 0%, #1a2035 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    h1 span {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .stats {
      margin-left: auto;
      display: flex;
      gap: 16px;
    }

    .stat-chip {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .stat-chip strong {
      color: var(--text);
      font-weight: 600;
    }

    /* Filter bar */
    .filterbar {
      max-width: 1200px;
      margin: 24px auto 0;
      padding: 0 32px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 240px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 14px 9px 38px;
      color: var(--text);
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--border-accent);
    }

    .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
    }

    .filter-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(79,142,247,0.06);
    }

    .progress-info {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-left: auto;
    }

    .progress-bar-wrap {
      width: 120px;
      height: 4px;
      background: var(--bg-elevated);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--success);
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* === MAIN LAYOUT === */
    main {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 32px 60px;
    }

    /* === EPISODE CARD === */
    .episode-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .episode-card:hover {
      border-color: var(--border-accent);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .episode-card.resolved {
      opacity: 0.5;
      border-color: var(--border);
    }

    .episode-card.resolved .card-header {
      background: var(--bg);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
    }

    .episode-num {
      flex-shrink: 0;
      width: 28px; height: 28px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .episode-meta {
      flex: 1;
    }

    .episode-date {
      font-size: 0.72rem;
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }

    .episode-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }

    .episode-badge-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .badge-warn {
      background: var(--warn-bg);
      color: var(--warn);
      border: 1px solid rgba(245,158,11,0.25);
    }

    .badge-ok {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(52,211,153,0.25);
    }

    .badge-participants {
      background: rgba(79,142,247,0.08);
      color: var(--accent);
      border: 1px solid rgba(79,142,247,0.2);
    }

    .chevron {
      flex-shrink: 0;
      color: var(--text-dim);
      font-size: 16px;
      transition: transform 0.2s;
      margin-top: 4px;
    }

    .episode-card.open .chevron { transform: rotate(180deg); }

    /* === CARD BODY === */
    .card-body {
      display: none;
      border-top: 1px solid var(--border);
    }

    .episode-card.open .card-body { display: block; }

    /* Audio player section */
    .player-section {
      padding: 16px 20px;
      background: linear-gradient(135deg, rgba(15,17,23,0.8), rgba(20,25,40,0.8));
      border-bottom: 1px solid var(--border);
    }

    .player-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .play-btn {
      flex-shrink: 0;
      width: 40px; height: 40px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 14px;
      color: white;
      transition: background 0.15s, transform 0.1s;
    }

    .play-btn:hover { background: #3a7ae8; transform: scale(1.05); }
    .play-btn.playing { background: var(--warn); }

    .player-controls {
      flex: 1;
    }

    .seek-bar-wrap {
      position: relative;
      height: 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .seek-bg {
      position: absolute;
      left: 0; right: 0;
      height: 4px;
      background: var(--bg-elevated);
      border-radius: 2px;
    }

    .seek-fill {
      position: absolute;
      left: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      border-radius: 2px;
      pointer-events: none;
    }

    .seek-thumb {
      position: absolute;
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(0,0,0,0.5);
      transform: translateX(-50%);
      pointer-events: none;
      transition: transform 0.05s;
    }

    .seek-bar-wrap input[type=range] {
      position: absolute;
      left: 0; right: 0;
      width: 100%;
      opacity: 0;
      height: 20px;
      cursor: pointer;
      margin: 0;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    .time-label {
      font-size: 0.68rem;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }

    .startpoint-label {
      font-size: 0.65rem;
      color: var(--warn);
      text-align: center;
    }

    /* Skip buttons */
    .skip-btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .skip-btn {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--text-muted);
      font-size: 0.7rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .skip-btn:hover {
      border-color: var(--border-accent);
      color: var(--text);
    }

    .rss-kuvaus {
      font-size: 0.75rem;
      color: var(--text-dim);
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }

    .rss-kuvaus strong {
      color: var(--text-muted);
    }

    /* Recommendations */
    .recs-section {
      padding: 16px 20px;
    }

    .recs-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .rec-item {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }

    .rec-item.suspicious-border {
      border-color: rgba(245, 158, 11, 0.4);
      box-shadow: inset 4px 0 0 var(--warn);
    }

    .rec-item.resolved-rec {
      border-color: rgba(52,211,153,0.3);
      background: rgba(5,41,24,0.5);
    }

    .rec-item.skipped-rec {
      opacity: 0.4;
    }

    .rec-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .rec-teos {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .rec-category {
      font-size: 0.68rem;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      padding: 2px 7px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .rec-kuvaus {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .rec-alert {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--warn-bg);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 10px;
    }

    .rec-alert-icon { font-size: 14px; }

    .rec-alert-text {
      font-size: 0.78rem;
      color: var(--warn);
    }

    .rec-alert-text strong { font-weight: 600; }

    /* Participants selector */
    .rec-participants {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .participant-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border-accent);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 0.76rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .participant-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(79,142,247,0.08);
    }

    .participant-btn.selected {
      border-color: var(--success);
      color: var(--success);
      background: rgba(52,211,153,0.1);
    }

    .rec-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .custom-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      color: var(--text);
      font-size: 0.78rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .custom-input:focus { border-color: var(--border-accent); }
    .custom-input::placeholder { color: var(--text-dim); }

    .action-btn {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 0.76rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: #3a7ae8; }
    .btn-primary:disabled { background: var(--bg-elevated); color: var(--text-dim); cursor: default; }

    .btn-skip {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .btn-skip:hover { border-color: var(--border-accent); color: var(--text); }

    .btn-verify {
      background: rgba(52, 211, 153, 0.05);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: #34d399;
    }

    .btn-verify:hover {
      background: rgba(52, 211, 153, 0.15);
      border-color: #34d399;
    }

    .resolved-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--success);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h2 { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 8px; }
    .empty p { font-size: 0.87rem; }

    /* Save button */
    .save-bar {
      position: fixed;
      bottom: 24px;
      right: 32px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .save-btn {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      border: none;
      border-radius: 24px;
      padding: 12px 24px;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(79,142,247,0.35);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(79,142,247,0.45);
    }

    .save-count {
      background: white;
      color: var(--accent);
      border-radius: 12px;
      padding: 1px 7px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      right: 32px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 0.82rem;
      color: var(--text);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* Login Gate */
    #login-gate {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 17, 23, 0.95);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }
    
    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .login-box h2 {
      font-size: 1.25rem;
      margin-bottom: 20px;
    }
    
    .login-box input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
    }
    
    .login-box input:focus {
      border-color: var(--accent);
    }
    
    .login-box button {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      header, main, .filterbar { padding-left: 16px; padding-right: 16px; }
      .stats { display: none; }
    }
  </style>
</head>
<body>

<!-- Login Gate -->
<div id="login-gate">
  <div class="login-box">
    <div class="logo-icon" style="margin: 0 auto 16px auto;">🔐</div>
    <h2>Admin-kirjautuminen</h2>
    <input type="password" id="admin-pswd" placeholder="Salasana" onkeydown="if(event.key==='Enter') tryLogin()" />
    <button onclick="tryLogin()">Kirjaudu</button>
  </div>
</div>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🎙️</div>
      <h1>
        Uutisraportti – Suosittelijavalidointi
        <span>Tarkista ja korjaa epäilyttävät suosittelijamerkinnät (Netlify Admin)</span>
      </h1>
    </div>
    <div class="stats">
      <div class="stat-chip" id="stat-jakso">– jaksoa</div>
      <div class="stat-chip" id="stat-rec">– suositusta</div>
      <div class="stat-chip" id="stat-resolved">0 korjattu</div>
      <button class="filter-btn" style="margin-left:8px" onclick="logout()">Kirjaudu ulos</button>
    </div>
  </div>
</header>

<div class="filterbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Hae jaksoa tai suosittelijaa..." />
  </div>
  <button class="filter-btn active" id="view-suspicious" onclick="setMainView('suspicious')">Vain epäilyttävät</button>
  <button class="filter-btn" id="view-all" onclick="setMainView('all')">Kaikki</button>
  <button class="filter-btn" id="view-corrected" onclick="setMainView('corrected')">Korjatut</button>
  <div style="display:flex; align-items:center; gap:8px; margin-left:auto;">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="global-progress" style="width:0%"></div>
    </div>
    <div class="progress-info" id="progress-text">0 / 0</div>
  </div>
</div>

<main id="main-list">
  <div class="empty" id="loading">
    <div class="empty-icon">⏳</div>
    <h2>Ladataan dataa...</h2>
  </div>
</main>

<div class="save-bar">
  <button class="save-btn" id="save-btn" onclick="saveChanges()">
    💾 Tallenna muutokset
    <span class="save-count" id="save-count">0</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================================================
// AUTH / LOGIN
// =====================================================
let adminToken = localStorage.getItem('validaattori_token') || '';

function tryLogin() {
  const input = document.getElementById('admin-pswd').value;
  if (input) {
    adminToken = input;
    localStorage.setItem('validaattori_token', adminToken);
    loadDataScriptAndInit();
  }
}

function logout() {
  localStorage.removeItem('validaattori_token');
  location.reload();
}

// =====================================================
// STATE
// =====================================================
let DATA = [];           // aktiivinen data (vaihtelee tilan mukaan)
let DATA_SUSPICIOUS = null; // epailyttavat.js data
let DATA_FULL = null;       // suositukset.json data (ladataan tarvittaessa)
let CORRECTIONS = {};    // { "jakso_id:r_idx": { ...uudet_kentat... } }
let mainView = 'suspicious'; // 'suspicious', 'all', 'corrected'
let currentSearch = '';
let activeAudio = null;  // tällä hetkellä auki oleva Audio-objekti

// =====================================================
// LOAD DATA
// =====================================================
function loadDataScriptAndInit() {
  if (!adminToken) return;
  
  // Hide login gate
  document.getElementById('login-gate').style.display = 'none';

  // Load the validation script dynamically
  const script = document.createElement('script');
  script.src = 'epailyttavat.js?v=' + Date.now();
  script.onload = async () => {
    if (window.VALIDATION_DATA) {
      DATA_SUSPICIOUS = window.VALIDATION_DATA;
      
      // Sortataan julkaisupäivän mukaan (uusin ensin), koska DD.MM.YYYY on hankala sortata pythonissa pelkkänä merkkijonona
      DATA_SUSPICIOUS.sort((a, b) => {
        const pa = a.paivamaara.split('.');
        const pb = b.paivamaara.split('.');
        const da = new Date(pa[2], pa[1] - 1, pa[0]);
        const db = new Date(pb[2], pb[1] - 1, pb[0]);
        return db.getTime() - da.getTime();
      });
      
      // Lataa ohitukset.json ja suodata pois jo vahvistetut
      try {
        const ohRes = await fetch('ohitukset.json?v=' + Date.now());
        if (ohRes.ok) {
          const ohitukset = await ohRes.json();
          window.OHITUKSET = ohitukset;
          const ohSet = new Set(ohitukset.map(o => o.jakso_id + ':' + o.r_idx));
          DATA_SUSPICIOUS.forEach(jakso => {
            jakso.suositukset.forEach(rec => {
              if (ohSet.has(jakso.jakso_id + ':' + rec.r_idx)) {
                rec.is_suspicious = false;
              }
            });
          });
        }
      } catch(e) { /* ohitukset.json ei vielä olemassa, ok */ }
      
      // Lataa odottavat korjaukset (korjaukset.json)
      try {
        const korjRes = await fetch('korjaukset.json?v=' + Date.now());
        if (korjRes.ok) {
          const korjaukset = await korjRes.json();
          window.KORJAUKSET = korjaukset;
          
          const korjMap = {};
          korjaukset.forEach(k => {
             korjMap[k.jakso_id + ':' + k.r_idx] = k;
          });
          
          DATA_SUSPICIOUS.forEach(jakso => {
             jakso.suositukset.forEach(rec => {
               const pend = korjMap[jakso.jakso_id + ':' + rec.r_idx];
               if (pend && pend.uusi_data) {
                 Object.assign(rec, pend.uusi_data);
                 rec.is_suspicious = false;
               } else if (pend && pend.uusi_suosittelija) {
                 rec.suosittelija = pend.uusi_suosittelija;
                 rec.is_suspicious = false;
               }
             });
          });
        }
      } catch(e) { }

      DATA = DATA_SUSPICIOUS;
      updateStats();
      renderList();
    } else {
      document.getElementById('loading').innerHTML = `
        <div class="empty-icon">❌</div>
        <h2>Datan lataus epäonnistui</h2>
        <p>Varmista että epailyttavat.js on samassa kansiossa.</p>
      `;
    }
  };
  script.onerror = () => {
    document.getElementById('loading').innerHTML = `
      <div class="empty-icon">❌</div>
      <h2>Datan lataus epäonnistui</h2>
      <p>Tiedostoa epailyttavat.js ei löytynyt.</p>
    `;
  };
  document.body.appendChild(script);
}

async function loadFullData() {
  if (DATA_FULL) {
    // Jo ladattu, käytä suoraan
    DATA = DATA_FULL;
    updateStats();
    renderList();
    return;
  }
  try {
    document.getElementById('main-list').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⏳</div>
        <h2>Ladataan koko tietokantaa...</h2>
      </div>`;
    const resp = await fetch('/suositukset.json?v=' + Date.now());
    const allData = await resp.json();
    
    // Muunna suositukset.json admin-työkalun muotoon
    DATA_FULL = allData.map((jakso, j_idx) => {
      const suositukset = (jakso.suositukset || []).map((rec, r_idx) => ({
        r_idx: r_idx,
        is_suspicious: false,
        suosittelija: rec.suosittelija || '',
        teos: rec.teos || '?',
        paakategoria: rec.paakategoria || '',
        kategoriat: rec.kategoriat || [],
        kuvaus: rec.kuvaus || '',
        google_linkki: rec.google_linkki || '',
        lisatieto_linkki: rec.lisatieto_linkki || '',
      }));
      return {
        j_idx: allData.length - j_idx, // vanhin = 1, uusin = N
        jakso_id: jakso.id,
        jakso_otsikko: jakso.jakso_otsikko,
        paivamaara: jakso.paivamaara || '?',
        audio_url: '',
        kesto_sek: 0,
        kesto_str: '',
        rss_osallistujat: [],
        rss_kuvaus: '',
        suositukset: suositukset,
      };
    });
    
    // Rikasta validointidatasta: is_suspicious -liput, audio-URL:t, RSS-tiedot
    if (DATA_SUSPICIOUS) {
      const valMap = {};
      DATA_SUSPICIOUS.forEach(vj => {
        valMap[vj.jakso_id] = vj;
      });
      DATA_FULL.forEach(fj => {
        const vj = valMap[fj.jakso_id];
        if (vj) {
          // Kopioi audio- ja RSS-tiedot
          fj.audio_url = vj.audio_url || fj.audio_url;
          fj.kesto_sek = vj.kesto_sek || fj.kesto_sek;
          fj.kesto_str = vj.kesto_str || fj.kesto_str;
          fj.rss_osallistujat = vj.rss_osallistujat.length > 0 ? vj.rss_osallistujat : fj.rss_osallistujat;
          fj.rss_kuvaus = vj.rss_kuvaus || fj.rss_kuvaus;
          // Kopioi is_suspicious -liput
          vj.suositukset.forEach(vs => {
            if (vs.is_suspicious && fj.suositukset[vs.r_idx]) {
              fj.suositukset[vs.r_idx].is_suspicious = true;
            }
          });
        }
      });
    }
    
    DATA = DATA_FULL;
    updateStats();
    renderList();
  } catch (err) {
    console.error('Virhe ladattaessa suositukset.json:', err);
    document.getElementById('main-list').innerHTML = `
      <div class="empty">
        <div class="empty-icon">❌</div>
        <h2>Tietokannan lataus epäonnistui</h2>
        <p>${err.message}</p>
      </div>`;
  }
}

// =====================================================
// HELPERS (sama kuin aiemmin)
// =====================================================
function corrKey(jakso_id, r_idx) { return `${jakso_id}:${r_idx}`; }
function getCorr(jakso_id, r_idx) { 
  const k = corrKey(jakso_id, r_idx);
  if (CORRECTIONS[k]) return CORRECTIONS[k]; 
  
  if (window.OHITUKSET) {
    if (window.OHITUKSET.find(o => o.jakso_id === jakso_id && o.r_idx === r_idx)) return { skipped: true, saved: true };
  }
  if (window.KORJAUKSET) {
    if (window.KORJAUKSET.find(o => o.jakso_id === jakso_id && o.r_idx === r_idx)) return { is_edited: true, saved: true };
  }
  return null;
}
function setCorr(jakso_id, r_idx, val) { CORRECTIONS[corrKey(jakso_id, r_idx)] = val; updateStats(); updateSaveBtn(); }
function totalRecs() { 
  if (mainView === 'suspicious') {
    return DATA.reduce((s, j) => s + j.suositukset.filter(r => r.is_suspicious).length, 0); 
  }
  return DATA.reduce((s, j) => s + j.suositukset.length, 0); 
}
function resolvedRecs() { 
  return Object.values(CORRECTIONS).filter(c => c && !c.skipped).length; 
}

function updateStats() {
  const total = totalRecs();
  const resolved = resolvedRecs();
  document.getElementById('stat-jakso').innerHTML = `<strong>${DATA.length}</strong> jaksoa`;
  document.getElementById('stat-rec').innerHTML = `<strong>${total}</strong> suositusta`;
  document.getElementById('stat-resolved').innerHTML = `<strong>${resolved}</strong> muokattu`;

  const pct = totalRecs() > 0 ? Math.round(resolvedRecs() / totalRecs() * 100) : 0;
  document.getElementById('global-progress').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${resolvedRecs()} / ${totalRecs()}`;
}

function updateSaveBtn() {
  const n = Object.values(CORRECTIONS).filter(c => c && !c.skipped && c.is_edited).length;
  document.getElementById('save-count').textContent = n;
}

function formatTime(sek) {
  const h = Math.floor(sek / 3600);
  const m = Math.floor((sek % 3600) / 60);
  const s = Math.floor(sek % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// =====================================================
// RENDER (sama kuin aiemmin)
// =====================================================
function setMainView(view) {
  mainView = view;
  document.getElementById('view-suspicious').classList.toggle('active', view === 'suspicious');
  document.getElementById('view-all').classList.toggle('active', view === 'all');
  document.getElementById('view-corrected').classList.toggle('active', view === 'corrected');
  
  if (view === 'all' || view === 'corrected') {
    if (!DATA_FULL || DATA_FULL.length === 0) {
      loadFullData();
      return;
    }
    DATA = DATA_FULL;
  } else {
    DATA = DATA_SUSPICIOUS || [];
  }
  updateStats();
  renderList();
}

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase();
  renderList();
});

function isJaksoResolved(jakso) {
  const suspiciousRecs = jakso.suositukset.filter(r => r.is_suspicious);
  if (suspiciousRecs.length === 0) return true; // ei epäilyttäviä = valmis
  return suspiciousRecs.every(rec => {
    const c = getCorr(jakso.jakso_id, rec.r_idx);
    return c && (c.skipped || c.is_edited);
  });
}

function renderList() {
  let filtered = DATA.filter(jakso => {
    // 1. View filtering
    if (mainView === 'suspicious') {
      const hasUnresolved = jakso.suositukset.some(r => {
        if (!r.is_suspicious) return false;
        const c = getCorr(jakso.jakso_id, r.r_idx);
        return !(c && (c.skipped || c.is_edited));
      });
      if (!hasUnresolved) return false;
    } else if (mainView === 'corrected') {
      const hasCorrection = jakso.suositukset.some(r => !!getCorr(jakso.jakso_id, r.r_idx));
      if (!hasCorrection) return false;
    }

    // 2. Search filtering
    if (currentSearch) {
      const hay = (jakso.jakso_otsikko + ' ' +
        jakso.suositukset.map(r => r.suosittelija + ' ' + r.teos).join(' ')).toLowerCase();
      if (!hay.includes(currentSearch)) return false;
    }
    return true;
  });

  const container = document.getElementById('main-list');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✨</div>
        <h2>Ei tuloksia</h2>
        <p>Muuta hakuehtoja tai suodatinta.</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map((jakso, i) => renderCard(jakso)).join('');
}

        ${n_open > 0

        ${jakso.rss_osallistujat.length > 0
          ? `<span class="badge badge-participants">📻 ${escHtml(jakso.rss_osallistujat.join(', '))}</span>`
          : ''}
        ${jakso.kesto_str ? `<span class="badge" style="background:rgba(255,255,255,0.04);color:var(--text-dim);border:1px solid var(--border);">⏱ ${jakso.kesto_str}</span>` : ''}
      </div>
    </div>
    <div class="chevron">▾</div>
  </div>
  <div class="card-body">
    ${jakso.audio_url ? `
    <div class="player-section">
      <div class="player-label">JAKSON KUUNTELU</div>
      <div class="player-row">
        <button class="play-btn" id="playbtn-${jakso.jakso_id}" onclick="togglePlay('${jakso.jakso_id}', '${jakso.audio_url}', ${startSek}, ${jakso.kesto_sek})">▶</button>

// =====================================================
// INTERACTION / SCRIPT LOGIC
// =====================================================
function toggleCard(jakso_id) {
  const card = document.getElementById('card-' + jakso_id);
  if (!card) return;
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.episode-card.open').forEach(c => {
    if (c !== card) { c.classList.remove('open'); stopAudio(c.id.replace('card-', '')); }
  });
  if (!isOpen) { card.classList.add('open'); } else { card.classList.remove('open'); stopAudio(jakso_id); }
}

function togglePlay(jakso_id, url, startSek, durationSek) {
  let audio = audioObjects[jakso_id];
  if (audio && !audio.paused) {
    audio.pause();
    document.getElementById('playbtn-' + jakso_id).textContent = '▶';
    document.getElementById('playbtn-' + jakso_id).classList.remove('playing');
    return;
  }
  Object.entries(audioObjects).forEach(([id, a]) => {
    if (id !== jakso_id && !a.paused) {
      a.pause();
      const btn = document.getElementById('playbtn-' + id);
      if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
    }
  });
  if (!audio) {
    audio = new Audio(url);
    audio.preload = 'metadata';
    audioObjects[jakso_id] = audio;
    audio.addEventListener('loadedmetadata', () => { if (audio.currentTime < 1) audio.currentTime = startSek; });
    audio.addEventListener('timeupdate', () => updateSeekUI(jakso_id, audio.currentTime, audio.duration || durationSek));
    audio.addEventListener('ended', () => {
      const btn = document.getElementById('playbtn-' + jakso_id);
      if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
    });
    audio.currentTime = startSek;
  }
  audio.play().then(() => {
    const btn = document.getElementById('playbtn-' + jakso_id);
    if (btn) { btn.textContent = '⏸'; btn.classList.add('playing'); }
  }).catch(e => showToast('❌ Äänen lataus epäonnistui: ' + e.message, 4000));
}

function stopAudio(jakso_id) {
  const audio = audioObjects[jakso_id];
  if (audio && !audio.paused) {
    audio.pause();
    const btn = document.getElementById('playbtn-' + jakso_id);
    if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
  }
}

function updateSeekUI(jakso_id, current, duration) {
  const pct = duration > 0 ? (current / duration * 100) : 0;
  const fill = document.getElementById('seekfill-' + jakso_id);
  const thumb = document.getElementById('seekthumb-' + jakso_id);
  const timeEl = document.getElementById('curtime-' + jakso_id);
  const range = document.getElementById('seekrange-' + jakso_id);
  if (fill) fill.style.width = pct + '%';
  if (thumb) thumb.style.left = pct + '%';
  if (timeEl) timeEl.textContent = formatTime(current);
  if (range) range.value = current;
}

function seekClick(e, jakso_id, durationSek) {
  const wrap = document.getElementById('seekwrap-' + jakso_id);
  if (!wrap) return;
  const rect = wrap.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const newTime = pct * durationSek;
  const audio = audioObjects[jakso_id];
  if (audio) audio.currentTime = newTime;
  updateSeekUI(jakso_id, newTime, durationSek);
}

function seekInput(input, jakso_id, durationSek) {
  const newTime = parseFloat(input.value);
  const audio = audioObjects[jakso_id];
  if (audio) audio.currentTime = newTime;
  updateSeekUI(jakso_id, newTime, durationSek);
}

function skipBy(jakso_id, delta) {
  const audio = audioObjects[jakso_id];
  if (audio) {
    audio.currentTime = Math.max(0, audio.currentTime + delta);
  } else {
    const range = document.getElementById('seekrange-' + jakso_id);
    if (range) {
      const newVal = Math.max(0, parseFloat(range.value) + delta);
      range.value = newVal;
      updateSeekUI(jakso_id, newVal, parseFloat(range.max));
    }
  }
}

let pendingSelections = {};

function markEdited(jakso_id, r_idx) {
  const btn = document.getElementById(`save-rec-btn-${jakso_id}-${r_idx}`);
  if (btn) btn.disabled = false;
}

function confirmCorr(jakso_id, r_idx) {
  const uusi_data = {
    teos: document.getElementById(`edit-teos-${jakso_id}-${r_idx}`).value.trim(),
    suosittelija: document.getElementById(`edit-suo-${jakso_id}-${r_idx}`).value.trim(),
    kuvaus: document.getElementById(`edit-kuvaus-${jakso_id}-${r_idx}`).value.trim(),
    paakategoria: document.getElementById(`edit-paak-${jakso_id}-${r_idx}`).value,
    kategoriat: document.getElementById(`edit-tagit-${jakso_id}-${r_idx}`).value.split(',').map(s => s.trim()).filter(s => s)
  };
  
  setCorr(jakso_id, r_idx, { is_edited: true, uusi_data: uusi_data });
  refreshRec(jakso_id, r_idx);
  refreshCardHeader(jakso_id);
  showToast(`✅ Päivitetty paikallisesti: ${uusi_data.teos}`);
}

function skipRec(jakso_id, r_idx) {
  setCorr(jakso_id, r_idx, { skipped: true });
  refreshRec(jakso_id, r_idx);
  refreshCardHeader(jakso_id);
}

function undoCorr(jakso_id, r_idx) {
  delete CORRECTIONS[corrKey(jakso_id, r_idx)];
  updateSaveBtn();
  refreshRec(jakso_id, r_idx);
  refreshCardHeader(jakso_id);
}

// NETLIFY API CALLS
async function verifyCorrect(jakso_id, r_idx) {
  if (!confirm('Haluatko varmasti lisätä tämän pysyviin ohituksiin?')) return;
  
  const item = { jakso_id, r_idx };
  
  try {
    const response = await fetch('/.netlify/functions/ohita', {
        method: 'POST',
        headers: { 
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + adminToken
        },
        body: JSON.stringify(item)
    });
    
    if (response.status === 401) throw new Error('Väärä salasana.');
    if (!response.ok) throw new Error('Palvelinvirhe: ' + response.statusText);
    
    // Päivitä paikallinen tila: merkitse suositus ei-epäilyttäväksi
    const jakso = DATA.find(j => j.jakso_id === jakso_id);
    if (jakso) {
      const rec = jakso.suositukset.find(r => r.r_idx === r_idx);
      if (rec) rec.is_suspicious = false;
      // Päivitä myös DATA_SUSPICIOUS jos saatavilla
      if (DATA_SUSPICIOUS) {
        const sj = DATA_SUSPICIOUS.find(j => j.jakso_id === jakso_id);
        if (sj) {
          const sr = sj.suositukset.find(r => r.r_idx === r_idx);
          if (sr) sr.is_suspicious = false;
        }
      }
      // Päivitä myös DATA_FULL jos saatavilla
      if (DATA_FULL) {
        const fj = DATA_FULL.find(j => j.jakso_id === jakso_id);
        if (fj) {
          const fr = fj.suositukset.find(r => r.r_idx === r_idx);
          if (fr) fr.is_suspicious = false;
        }
      }
      refreshRec(jakso_id, r_idx);
      refreshCardHeader(jakso_id);
      updateStats();
    }
    
    showToast('✅ Vahvistettu oikeaksi ja tallennettu pysyvästi.');
  } catch (err) {
    console.error('Verify failed:', err);
    showToast('❌ Virhe: ' + err.message);
  }
}

function refreshRec(jakso_id, r_idx) {
  const jakso = DATA.find(j => j.jakso_id === jakso_id);
  if (!jakso) return;
  const rec = jakso.suositukset.find(r => r.r_idx === r_idx);
  if (!rec) return;
  const el = document.getElementById(`rec-${jakso_id}-${r_idx}`);
  if (el) el.outerHTML = renderRec(jakso, rec);
}

function refreshCardHeader(jakso_id) {
  const jakso = DATA.find(j => j.jakso_id === jakso_id);
  if (!jakso) return;
  const card = document.getElementById('card-' + jakso_id);
  if (!card) return;
  const suspiciousRecs = jakso.suositukset.filter(r => r.is_suspicious);
  const n_open = suspiciousRecs.filter(rec => {
    const c = getCorr(jakso.jakso_id, rec.r_idx);
    return !(c && (c.skipped || c.is_edited));
  }).length;
  
  const badgeRow = card.querySelector('.episode-badge-row');
  if (badgeRow) {
    const first = badgeRow.firstElementChild;
    if (first) {
      if (n_open > 0) {
        first.className = 'badge badge-warn';
        first.innerHTML = `⚠️ ${n_open} auki`;
      } else {
        first.className = 'badge badge-ok';
        first.innerHTML = `✓ Valmis`;
      }
    }
  }
}

function saveChanges() {
  const corrections = [];
  DATA.forEach(jakso => {
    jakso.suositukset.forEach(rec => {
      const c = getCorr(jakso.jakso_id, rec.r_idx);
      if (c && !c.skipped && c.is_edited) {
        corrections.push({
          jakso_id: jakso.jakso_id,
          jakso_otsikko: jakso.jakso_otsikko,
          paivamaara: jakso.paivamaara,
          r_idx: rec.r_idx,
          teos: rec.teos,
          uusi_data: c.uusi_data
        });
      }
    });
  });

  if (corrections.length === 0) {
    showToast('Ei muutoksia tallennettavaksi.');
    return;
  }

  const saveBtn = document.getElementById('save-btn');
  const originalHtml = saveBtn.innerHTML;
  saveBtn.disabled = true;
  saveBtn.innerHTML = '⏳ Tallennetaan ja julkaistaan...';

  fetch('/.netlify/functions/tallenna', {
    method: 'POST',
    headers: { 
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + adminToken
    },
    body: JSON.stringify(corrections)
  })
  .then(async response => {
    if (response.status === 401) throw new Error('Väärä salasana.');
    if (!response.ok) {
        const text = await response.text();
        throw new Error('Palvelinvirhe: ' + text);
    }
    return response.json();
  })
  .then(data => {
    showToast('✅ Korjaukset tallennettu GitHubiin (viive n. 1min ennen kuin näkyy Netlifyssä)!', 5000);
    setTimeout(() => location.reload(), 3000);
  })
  .catch(err => {
    console.error('Save failed:', err);
    showToast('❌ Virhe: ' + err.message, 7000);
  })
  .finally(() => {
    saveBtn.disabled = false;
    saveBtn.innerHTML = originalHtml;
  });
}

function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(str) { return String(str).replace(/'/g,"\\'").replace(/"/g,'\\"'); }

// Init
if (adminToken) {
    loadDataScriptAndInit();
}
